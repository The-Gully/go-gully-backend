version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB=host=postgres user=${DB_USER:-postgres} password=${DB_PASSWORD} dbname=${DB_NAME:-gully} port=5432 sslmode=disable
      - SESSION_SECRET=${SESSION_SECRET}
      - SQL_AGENT_URL=${SQL_AGENT_URL:-http://host.docker.internal:8000}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL:-http://localhost:8080/auth/google/callback}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - GIN_MODE=${GIN_MODE:-debug}
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME:-gully}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
